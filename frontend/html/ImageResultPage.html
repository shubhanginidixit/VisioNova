<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VisioNova - Image Analysis Telemetry</title>
    <script>
        (function() {
            const theme = localStorage.getItem('visioNova_theme') || 'dark';
            document.documentElement.classList.add(theme);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "v-bg": "#0A0F1A", 
                        "v-surface": "#0F1626", 
                        "v-panel": "#141C2F", 
                        "v-border": "rgba(255, 255, 255, 0.08)",
                        "v-border-focus": "rgba(100, 255, 218, 0.4)",
                        "v-text-main": "#F8FAFC",
                        "v-text-muted": "#94A3B8",
                        "v-authentic": "#64FFDA", 
                        "v-suspicious": "#FFB74D", 
                        "v-brand": "#3B82F6",
                        "v-danger": "#FF4A4A"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "mono": ["Roboto Mono", "monospace"],
                    },
                    boxShadow: {
                        'panel': '0 4px 6px -1px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05)',
                    }
                },
            },
        }
    </script>
    
    <style>
        /* Base system overrides */
        body { background-color: #0A0F1A !important; color: #F8FAFC !important; letter-spacing: -0.01em; }
        .light body { background-color: #F8FAFC !important; color: #0F172A !important; }
        
        .panel {
            background-color: theme('colors.v-panel');
            border: 1px solid theme('colors.v-border');
            box-shadow: theme('boxShadow.panel');
        }
        
        .structural-grid {
            background-image: linear-gradient(theme('colors.v-border') 1px, transparent 1px),
                              linear-gradient(90deg, theme('colors.v-border') 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
        }

        .data-label { font-family: theme('fontFamily.mono'); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: theme('colors.v-text-muted'); }
        
        /* Tab states */
        .media-tab { transition: all 0.2s; background: theme('colors.v-panel'); }
        .active-tab { border-bottom: 2px solid theme('colors.v-authentic'); color: theme('colors.v-authentic'); background: theme('colors.v-surface'); }
        .inactive-tab { border-bottom: 2px solid transparent; color: theme('colors.v-text-muted'); }
        .inactive-tab:hover { color: white; background: rgba(255,255,255,0.02); }

        /* ====================================================================
           FORCE JS INJECTED TEMPLATES TO FOLLOW THE NEW DESIGN SYSTEM 
           ==================================================================== */
        
        /* Strip background and borders from injected cards */
        #tab-content .bg-card-dark,
        #tab-content .bg-\[\#1e2338\],
        #tab-content .bg-background-dark\/50 {
            background-color: theme('colors.v-panel') !important;
            border: 1px solid theme('colors.v-border') !important;
            border-radius: 0 !important; /* brutalist strict grid */
            box-shadow: none !important;
        }

        /* Remove all rounded corners aggressively */
        #tab-content .rounded-xl,
        #tab-content .rounded-2xl,
        #tab-content .rounded-lg,
        #tab-content .rounded-full {
            border-radius: 0 !important;
        }

        /* Override specific border tokens mapped in JS */
        #tab-content .border-\[\#20324b\],
        #tab-content .border-white\/5,
        #tab-content .border-white\/10 {
            border-color: theme('colors.v-border') !important;
        }

        /* Typography mappings for injected content */
        #tab-content h3 {
            font-family: theme('fontFamily.sans');
            font-weight: 600;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            font-size: 0.85rem !important;
            color: theme('colors.v-text-muted') !important;
            border-bottom: 1px solid theme('colors.v-border');
            padding-bottom: 0.5rem;
            margin-bottom: 1rem !important;
        }

        #tab-content .text-slate-400,
        #tab-content .text-slate-300,
        #tab-content .text-slate-500 {
            color: theme('colors.v-text-muted') !important;
            font-family: theme('fontFamily.mono');
            font-size: 0.75rem !important;
        }

        /* Number/Data overrides */
        #tab-content .text-2xl,
        #tab-content .text-4xl,
        #tab-content .text-3xl {
            font-family: theme('fontFamily.mono');
            font-weight: 700;
            color: theme('colors.v-text-main') !important;
        }

        /* Strip shadows */
        #tab-content .shadow-xl,
        #tab-content .shadow-2xl {
            box-shadow: none !important;
        }

        /* Adjust button styles inside injected content */
        #tab-content button {
            border: 1px solid theme('colors.v-border') !important;
            border-radius: 0 !important;
            font-family: theme('fontFamily.mono');
            text-transform: uppercase;
            font-size: 0.75rem !important;
            background: theme('colors.v-surface') !important;
        }
        #tab-content button:hover {
            border-color: theme('colors.v-authentic') !important;
            color: theme('colors.v-authentic') !important;
        }
        
        /* Specific Fixes for Visualizations */
        .visualization-btn { flex: 1; justify-content: center; }
        .visualization-btn.active { border-color: theme('colors.v-authentic') !important; background: rgba(100,255,218,0.1) !important; color: theme('colors.v-authentic') !important; }

        /* Metrics Grid specific override */
        #tab-content .grid-cols-2.lg\:grid-cols-4 > div { border-radius: 0 !important; }

        /* Icons in headers */
        #tab-content h3 .material-symbols-outlined { font-size: 1rem; color: theme('colors.v-authentic') !important; }

        /* Gauge / Verdict fixes */
        #verdictLabel { border-radius: 0 !important; font-family: theme('fontFamily.mono'); letter-spacing: 0.1em; }
    </style>

    <link rel="stylesheet" href="../css/common.css">
    <script src="../js/layout.js"></script>
</head>

<body class="flex h-screen w-full flex-col overflow-hidden selection:bg-v-brand selection:text-white relative">
    
    <!-- Background Texture -->
    <div class="absolute inset-0 pointer-events-none structural-grid z-0"></div>

    <!-- Top Navigation Bar (Injected by layout.js) -->
    <header class="relative z-20 border-b border-v-border bg-v-bg/90 backdrop-blur-sm"></header>

    <div class="flex flex-1 overflow-hidden relative z-10 w-full max-w-[1600px] mx-auto">
        <!-- Sidebar Navigation (Injected by layout.js) -->
        <aside class="border-r border-v-border bg-v-bg/90 backdrop-blur-sm hidden md:block w-64"></aside>
        
        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto w-full px-6 py-8 flex flex-col gap-6">
            
            <!-- Page Heading (Terminal Style) -->
            <div class="flex flex-col gap-4 border border-v-border panel p-6 rounded-none relative">
                <div class="absolute top-0 right-0 p-2 opacity-50"><span class="material-symbols-outlined text-v-text-muted">memory</span></div>
                
                <div class="flex items-center gap-2 text-v-text-muted font-mono text-[10px] tracking-widest uppercase">
                    <span>Telemetry</span> <span class="text-v-authentic">></span> <span>Image Analysis</span>
                </div>
                
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-3">
                            <span id="statusBadge" class="px-2 py-0.5 border border-v-authentic text-v-authentic bg-v-authentic/10 font-mono text-[10px] uppercase tracking-wider animate-pulse">Processing Array</span>
                            <span id="analysisId" class="text-v-text-muted font-mono text-[10px]"></span>
                        </div>
                        <h1 id="pageTitle" class="text-3xl font-semibold tracking-tight text-white">Visual Telemetry Report</h1>
                        <p id="pageSubtitle" class="data-label">Source Feed: Active • <span id="analysisTime"></span></p>
                    </div>
                    
                    <div class="flex gap-3">
                        <button id="reanalyzeBtn" class="border border-v-border bg-v-surface hover:border-v-authentic text-v-text-muted hover:text-v-authentic transition-colors px-4 py-2 font-mono text-xs flex items-center gap-2 uppercase">
                            <span class="material-symbols-outlined text-sm">refresh</span> Recall
                        </button>
                        <button id="exportPdfBtn" class="border border-v-authentic bg-v-authentic/10 text-v-authentic hover:bg-v-authentic/20 transition-colors px-4 py-2 font-mono text-xs flex items-center gap-2 uppercase">
                            <span class="material-symbols-outlined text-sm">download</span> Fetch Report
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Work Area Container -->
            <div class="flex flex-col flex-1 gap-0 panel border border-v-border">
                
                <!-- Tab Navigation (Strict Grid) -->
                <div class="grid grid-cols-4 border-b border-v-border bg-v-bg" id="tab-nav">
                    <button onclick="switchTab('overview')" id="tab-overview" class="media-tab flex items-center justify-center gap-2 py-3 active-tab border-r border-v-border">
                        <span class="material-symbols-outlined text-sm">dashboard</span> <span class="data-label !text-[10px] md:!text-xs">Overview Matrix</span>
                    </button>
                    <button onclick="switchTab('technical')" id="tab-technical" class="media-tab flex items-center justify-center gap-2 py-3 inactive-tab border-r border-v-border">
                        <span class="material-symbols-outlined text-sm">analytics</span> <span class="data-label !text-[10px] md:!text-xs">Technical Pipeline</span>
                    </button>
                    <button onclick="switchTab('metadata')" id="tab-metadata" class="media-tab flex items-center justify-center gap-2 py-3 inactive-tab border-r border-v-border">
                        <span class="material-symbols-outlined text-sm">data_object</span> <span class="data-label !text-[10px] md:!text-xs">Metadata Layers</span>
                    </button>
                    <button onclick="switchTab('ai-analysis')" id="tab-ai-analysis" class="media-tab flex items-center justify-center gap-2 py-3 inactive-tab">
                        <span class="material-symbols-outlined text-sm">psychology</span> <span class="data-label !text-[10px] md:!text-xs">ViT Ensemble Vectors</span>
                    </button>
                </div>

                <!-- Dynamic Tab Content Container -->
                <!-- The JS injects the content here. Our <style> block will force it into the new brutalist design system -->
                <div id="tab-content" class="p-6 min-h-[500px] bg-v-surface/50">
                    <!-- Content dynamically generated -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Re-styled for the new design system) -->
    
    <!-- Feedback Modal -->
    <div id="feedbackModal" class="fixed inset-0 bg-v-bg/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-v-panel border border-v-suspicious p-6 w-full max-w-md relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-v-suspicious"></div>
            <div class="flex items-center justify-between mb-6 pb-2 border-b border-v-border">
                <h3 class="data-label text-v-suspicious text-sm">Report Telemetry Anomaly</h3>
                <button onclick="closeFeedbackModal()" class="text-v-text-muted hover:text-white">
                    <span class="material-symbols-outlined text-lg">close</span>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block data-label mb-2">Anomaly Classification</label>
                    <select id="feedbackType" class="w-full bg-v-surface font-mono text-xs text-v-text-main rounded-none px-3 py-2 border border-v-border focus:border-v-suspicious outline-none">
                        <option value="false_positive">False Positive (Authentic flagged as Synthetic)</option>
                        <option value="false_negative">False Negative (Synthetic flagged as Authentic)</option>
                        <option value="analysis_error">Pipeline Execution Error</option>
                        <option value="other">Unclassified Error</option>
                    </select>
                </div>
                <div>
                    <label class="block data-label mb-2">Diagnostic Notes</label>
                    <textarea id="feedbackDescription" rows="4" class="w-full bg-v-surface font-mono text-xs text-v-text-main rounded-none px-3 py-2 border border-v-border focus:border-v-suspicious outline-none resize-none" placeholder="[ INPUT DIAGNOSTIC LOG ]..."></textarea>
                </div>
                <button onclick="submitFeedback()" class="w-full bg-transparent border border-v-suspicious text-v-suspicious hover:bg-v-suspicious/10 font-mono text-xs py-3 uppercase tracking-wider transition-colors">
                    Transmit Anomaly Report
                </button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Viewer Modal -->
    <div id="fullscreenModal" class="fixed inset-0 bg-v-bg/95 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center border-b border-v-border bg-v-panel/50">
            <span class="data-label text-v-authentic flex items-center gap-2"><span class="material-symbols-outlined">zoom_in</span> High-Res Viewer</span>
            <button onclick="closeFullscreenViewer()" class="text-v-text-muted hover:text-white flex items-center border border-v-border px-3 py-1 font-mono text-xs">
                [ CLOSE ]
            </button>
        </div>
        <div class="w-full h-full flex items-center justify-center pt-16 pb-4">
            <img id="fullscreenImage" src="" alt="Fullscreen view" class="max-w-full max-h-full object-contain border border-v-border" />
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/storage-utils.js"></script>
    <script src="../js/theme-toggle.js"></script>
    <script src="../js/image-result.js"></script>
</body>
</html>
