<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VisioNova - Analysis Dashboard</title>
    <!-- Blocking theme script to prevent FOUC -->
    <script>
        (function () {
            const theme = localStorage.getItem('visioNova_theme') || 'dark';
            document.documentElement.classList.add(theme);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3A8DFF",
                        "accent-success": "#00D991",
                        "accent-warning": "#FFB74A",
                        "accent-danger": "#FF4A4A",
                        "background-light": "#F5F7FA",
                        "background-dark": "#0F121A",
                        "surface-dark": "#0D1B2A",
                        "panel-dark": "#161B2E",
                        "card-dark": "#1E2338",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        'glow-blue': '0 0 15px rgba(58, 141, 255, 0.4)',
                        'glow-green': '0 0 15px rgba(0, 217, 145, 0.3)',
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <!-- Storage Utilities - must load before inline scripts -->
    <script src="../js/storage-utils.js"></script>
    <script src="../js/theme-toggle.js"></script>
</head>

<body
    class="relative flex h-screen w-full flex-col bg-background-dark text-white overflow-hidden selection:bg-primary selection:text-white">
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div
            class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150 mix-blend-overlay">
        </div>
        <div class="absolute inset-0 bg-hero-gradient opacity-40"></div>
    </div>
    <!-- Top Navigation (Injected by layout.js) -->
    <header></header>

    <!-- Main Layout -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Navigation (Injected by layout.js) -->
        <aside></aside>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto relative bg-background-dark bg-hero-gradient">
            <!-- Background Decorative Elements -->
            <div class="absolute inset-0 pointer-events-none overflow-hidden">
                <div
                    class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-primary/5 rounded-full blur-[100px]">
                </div>
                <!-- Grid pattern -->
                <div
                    class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:40px_40px] [mask-image:radial-gradient(ellipse_at_center,black_40%,transparent_80%)]">
                </div>
            </div>
            <div class="h-full flex flex-col">
                <div class="flex flex-1 min-h-0 items-center justify-center p-6">
                    <div class="w-full max-w-2xl flex flex-col gap-6 relative z-10">
                        <!-- Real-time Scanner Card -->
                        <div
                            class="glass-panel rounded-2xl p-8 relative overflow-hidden shadow-[0_0_50px_rgba(58,141,255,0.15)] border border-[#1E293B] bg-[#0F121A]/80 bg-panel-dark backdrop-blur-xl">
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <h3 class="text-xl font-bold text-white flex items-center gap-3">
                                        <span class="relative flex h-3 w-3">
                                            <span
                                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent-blue opacity-75"></span>
                                            <span
                                                class="relative inline-flex rounded-full h-3 w-3 bg-accent-blue"></span>
                                        </span>
                                        Analyzing Media
                                    </h3>
                                    <p class="text-sm text-slate-400 mt-1 pl-6 leading-relaxed">Processing multi-modal
                                        vectors...
                                    </p>
                                </div>
                                <span
                                    class="material-symbols-outlined text-accent-blue animate-spin-slow text-2xl">settings_motion_mode</span>
                            </div>
                            <!-- Visualizer -->
                            <div
                                class="visualizer-box h-48 rounded-xl bg-[#080b12] border border-[#1E293B] relative flex items-center justify-center mb-8 overflow-hidden group">
                                <div
                                    class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-accent-blue/10 to-transparent opacity-50 animate-pulse">
                                </div>
                                <div
                                    class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-10 mix-blend-overlay">
                                </div>

                                <!-- Abstract Waveform Animation -->
                                <div class="flex gap-1.5 items-end h-20">
                                    <div
                                        class="w-1.5 bg-accent-blue/40 h-6 rounded-full animate-[pulse_1s_ease-in-out_infinite]">
                                    </div>
                                    <div
                                        class="w-1.5 bg-accent-blue/60 h-10 rounded-full animate-[pulse_1.2s_ease-in-out_infinite]">
                                    </div>
                                    <div
                                        class="w-1.5 bg-accent-blue h-16 rounded-full animate-[pulse_0.8s_ease-in-out_infinite]">
                                    </div>
                                    <div
                                        class="w-1.5 bg-accent-blue h-12 rounded-full animate-[pulse_1.1s_ease-in-out_infinite]">
                                    </div>
                                    <div
                                        class="w-1.5 bg-accent-blue/60 h-8 rounded-full animate-[pulse_0.9s_ease-in-out_infinite]">
                                    </div>
                                    <div
                                        class="w-1.5 bg-accent-blue/40 h-5 rounded-full animate-[pulse_1.3s_ease-in-out_infinite]">
                                    </div>
                                </div>

                                <!-- Scanning Line -->
                                <div class="absolute top-0 bottom-0 w-[2px] bg-accent-green/80 shadow-[0_0_15px_#00D991] scan-line"
                                    style="left: 30%; animation: scan 2s ease-in-out infinite alternate;">
                                </div>
                                <div
                                    class="absolute top-4 right-4 font-mono text-[10px] text-accent-green bg-accent-green/10 px-2 py-1 rounded border border-accent-green/20">
                                    PROCESSING_FRAMES</div>
                            </div>
                            <!-- Progress Bars - Dynamically populated based on media type -->
                            <div id="analysisSteps" class="space-y-6">
                                <!-- Will be populated by JavaScript -->
                            </div>
                        </div>
                        <p class="text-center text-slate-500 text-sm animate-pulse" id="loadingStatus">establishing
                            secure
                            connection...</p>
                    </div>
                </div>

                <!-- Dynamic Analysis Script -->
                <script src="../js/config.js"></script>
                <script src="../js/analysis.js"></script>
            </div>
        </main>
    </div>
</body>

</html>
